apiVersion: apps/v1
kind: Deployment
metadata:
  name: devhub-gateway
  namespace: devhub
  labels:
    app: devhub-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devhub-gateway
  template:
    metadata:
      labels:
        app: devhub-gateway
    spec:
      containers:
        - name: gateway
          image: devhub-mcp:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py"]
          stdin: true
          tty: false
          envFrom:
            - secretRef:
                name: devhub-secrets
            - configMapRef:
                name: devhub-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import asyncio,json;from main import hub_mcp;r=asyncio.run(hub_mcp.call_tool('healthz',{}));assert json.loads(r.content[0].text)['status']=='ok'"
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import asyncio;from main import hub_mcp;asyncio.run(hub_mcp.list_tools())"
            initialDelaySeconds: 5
            periodSeconds: 10
