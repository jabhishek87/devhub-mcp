apiVersion: apps/v1
kind: Deployment
metadata:
  name: devhub-gateway
  namespace: devhub
  labels:
    app: devhub-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devhub-gateway
  template:
    metadata:
      labels:
        app: devhub-gateway
    spec:
      containers:
        - name: gateway
          image: devhub-mcp:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py", "http"]
          stdin: true
          tty: false
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: devhub-secrets
            - configMapRef:
                name: devhub-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
